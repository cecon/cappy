name: Cappy Publish Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Set unique publish version
        run: |
          node -e "const fs=require('fs'); const p='./package.json'; const pkg=JSON.parse(fs.readFileSync(p,'utf8')); const [majorRaw,minorRaw,patchRaw]=pkg.version.split('.'); const major=Number.parseInt(majorRaw,10)||0; const minor=Number.parseInt(minorRaw,10)||0; const patchBase=Number.parseInt(String(patchRaw).replace(/[^0-9].*$/,''),10)||0; const run=Number.parseInt(process.env.GITHUB_RUN_NUMBER||'0',10); const attempt=Number.parseInt(process.env.GITHUB_RUN_ATTEMPT||'1',10); const uniquePatch=patchBase + (run * 100) + attempt; pkg.version=major + '.' + minor + '.' + uniquePatch; fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n'); console.log('Publishing version:', pkg.version);"

      - name: Package
        run: npm run package

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --dependencies -p ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: npx ovsx publish *.vsix -p ${{ secrets.OVSX_PAT }}

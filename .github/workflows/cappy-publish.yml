name: Cappy Publish Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Set publish version from latest prod tag
        id: version
        shell: bash
        run: |
          node -e "const fs=require('fs'); const cp=require('child_process'); const p='./extension/package.json'; const pkg=JSON.parse(fs.readFileSync(p,'utf8')); const tagsRaw=cp.execSync('git tag -l \"v*\" --sort=-v:refname',{encoding:'utf8'}).trim(); const latestTag=tagsRaw.split('\n').filter(Boolean)[0]||''; const versionFromTag=latestTag.replace(/^v/,''); const parsed=versionFromTag.match(/^(\d+)\.(\d+)\.(\d+)/); let major=0; let minor=1; let patch=0; if(parsed){major=Number.parseInt(parsed[1],10); minor=Number.parseInt(parsed[2],10); patch=Number.parseInt(parsed[3],10)+1;} else {const cur=(pkg.version||'0.1.0').match(/^(\d+)\.(\d+)\.(\d+)/); if(cur){major=Number.parseInt(cur[1],10); minor=Number.parseInt(cur[2],10); patch=Number.parseInt(cur[3],10);} } const run=Number.parseInt(process.env.GITHUB_RUN_NUMBER||'0',10); const attempt=Number.parseInt(process.env.GITHUB_RUN_ATTEMPT||'1',10); const uniquePatch=patch + (run*100) + attempt; pkg.version=major + '.' + minor + '.' + uniquePatch; fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n'); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'version=' + pkg.version + '\n'); console.log('Latest prod tag:', latestTag || '(none)'); console.log('Publishing version:', pkg.version);"

      - name: Package
        run: npm run package

      - name: Publish to VS Code Marketplace
        run: |
          cd extension
          npx @vscode/vsce publish --packagePath "eduardocecon.cappy-${{ steps.version.outputs.version }}.vsix" -p "${{ secrets.VSCE_PAT }}"

      - name: Publish to Open VSX
        run: |
          cd extension
          npx ovsx publish "eduardocecon.cappy-${{ steps.version.outputs.version }}.vsix" -p "${{ secrets.OVSX_PAT }}"
